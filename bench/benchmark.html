<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1:1 Chart Benchmark</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: oklch(16.8% 0 0);
        color: rgba(255, 255, 255, 0.92);
        font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overscroll-behavior: none;
      }

      body {
        padding: 12px;
        display: grid;
        grid-template-rows: auto auto auto;
        gap: 10px;
        align-content: start;
      }

      #links {
        display: flex;
        gap: 12px;
      }

      #links a {
        color: #7db1ff;
        text-decoration: none;
      }

      #plot {
        position: relative;
        width: 1920px;
        height: 600px;
        border: 1px solid #1f1f1f;
        background: #000;
      }

      #plot-stats {
        position: absolute;
        top: 8px;
        right: 8px;
        z-index: 10;
        pointer-events: none;
        padding: 4px 8px;
        background: rgba(10, 12, 15, 0.74);
        border: 1px solid rgba(70, 78, 90, 0.7);
        color: rgba(210, 220, 235, 0.9);
        font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        white-space: pre;
      }

      #plot canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #plot .text-canvas {
        pointer-events: none;
        z-index: 2;
      }

      #plot .overlay-canvas {
        pointer-events: none;
        z-index: 3;
      }

      #plot .uplot,
      #plot .u-axis,
      #plot .u-title,
      #plot .u-label,
      #plot .u-value,
      #plot .u-series,
      #plot .u-cursor-pt {
        color: rgba(255, 255, 255, 0.92);
      }

      #result-json {
        display: none;
      }
    </style>
  </head>
  <body>
    <h2 id="wait">Loading benchmark...</h2>
    <div id="links">
      <a href="./benchmark.html?lib=wplot">Run wplot</a>
      <a href="./benchmark.html?lib=uplot">Run uPlot</a>
    </div>
    <div id="plot">
      <div id="plot-stats">frame -- ms\nfps --</div>
    </div>
    <pre id="result-json"></pre>
    <script type="module" src="./benchmark.ts"></script>
  </body>
</html>
